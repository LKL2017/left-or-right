<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数量跑酷 - Left or Right</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/objects/Track.js"></script>
    <script src="js/objects/Player.js"></script>
    <script src="js/objects/Gate.js"></script>
    <script src="js/objects/Enemy.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/PlayScene.js"></script>
    <script src="js/scenes/GameOverScene.js"></script>
    <script>
        const game = new Phaser.Game({
            type: Phaser.AUTO,
            width: GAME_W,
            height: GAME_H,
            backgroundColor: COLORS.bg,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
            },
            scene: [MenuScene, PlayScene, GameOverScene],
            input: {
                activePointers: 2,
            },
        });
    </script>
</body>
</html>
